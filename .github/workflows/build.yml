name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # macOS: 导入自签名证书用于 codesign（缺少 secret 直接失败）
      - name: Import macOS signing certificate
        if: contains(matrix.target, 'apple')
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # 校验必要的 secrets
          if [ -z "$CERTIFICATE_P12" ]; then
            echo "::error::CERTIFICATE_P12 secret is missing"
            exit 1
          fi
          if [ -z "$CERTIFICATE_PASSWORD" ]; then
            echo "::error::CERTIFICATE_PASSWORD secret is missing"
            exit 1
          fi
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::APPLE_SIGNING_IDENTITY secret is missing"
            exit 1
          fi

          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12

          # 创建临时钥匙串并配置
          security create-keychain -p "actions" /tmp/build.keychain
          security set-keychain-settings -lut 3600 /tmp/build.keychain
          security unlock-keychain -p "actions" /tmp/build.keychain

          # 导入证书（-A 允许所有应用访问，-T 明确授权 codesign）
          security import /tmp/cert.p12 \
            -k /tmp/build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -A

          # 设为默认并加入搜索列表（保留已有的 login + System keychain）
          security default-keychain -s /tmp/build.keychain
          security list-keychains -d user -s /tmp/build.keychain $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')

          # 关键：允许 codesign 无弹窗使用证书的私钥
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "actions" /tmp/build.keychain

          # 验证证书已导入且可用于签名
          security find-identity -p codesigning /tmp/build.keychain | grep "$APPLE_SIGNING_IDENTITY" || {
            echo "::error::Certificate '$APPLE_SIGNING_IDENTITY' not found in keychain after import"
            echo "Available identities:"
            security find-identity /tmp/build.keychain
            exit 1
          }

          # 清理临时文件
          rm -f /tmp/cert.p12

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing version to $VERSION"
          # package.json
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          # Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS: 指定签名证书名称（通过 tauri.conf.json signingIdentity=null 时读取此变量）
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'hiven ${{ github.ref_name }}'
          releaseBody: 'See the assets for download links.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
